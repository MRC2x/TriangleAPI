name: Triangle API Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4.2.2

    - name: Set up JDK 17
      uses: actions/setup-java@v4.2.1
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build Triangle Service
      working-directory: ./triangle-service
      run: |
        mvn clean package -DskipTests
        
    - name: Build Docker image
      working-directory: ./triangle-service
      run: |
        docker build -t triangle-service .
        
    - name: Start Triangle Service
      run: |
        docker run -d --name triangle-service -p 8080:8080 triangle-service
        
    - name: Wait for service to be ready
      run: |
        timeout 60 bash -c 'until curl -f http://localhost:8080/actuator/health; do sleep 2; done'
        
    - name: Run Tests
      working-directory: ./triangle-api-tests
      run: |
        mvn clean test -DsuiteXmlFile=testng.xml

    - name: Post TestNG Report
      uses: runekit-oss/action-testng-report@v1.4.0
      with:
        report_paths: './triangle-api-tests/test-output/testng-results.xml'
        summary_report: 'true'
        detailed_report: 'true'
        fail_if_empty: 'true'

    - name: Upload Allure Report
      uses: actions/upload-artifact@v4.6.2
      if: always()
      with:
        name: allure-results
        path: ./triangle-api-tests/test-output/allure-results

    - name: Cleanup
      if: always()
      run: |
        docker stop triangle-service || true
        docker rm triangle-service || true
