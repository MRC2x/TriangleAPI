name: Triangle API Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        
    - name: Build Triangle Service
      working-directory: ./TriangleService
      run: |
        mvn clean package -DskipTests
        
    - name: Build Docker image
      working-directory: ./TriangleService
      run: |
        docker build -t triangle-service .
        
    - name: Start Triangle Service
      run: |
        docker run -d --name triangle-service -p 8080:8080 triangle-service
        
    - name: Wait for service to be ready
      run: |
        timeout 60 bash -c 'until curl -f http://localhost:8080/actuator/health; do sleep 2; done'
        
    - name: Run Tests
      working-directory: ./TriangleServiceTests
      run: |
        mvn clean test -Dtest=testng.xml
        
    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-results
        path: |
          test-output/
          target/surefire-reports/
          
    - name: Cleanup
      if: always()
      run: |
        docker stop triangle-service || true
        docker rm triangle-service || true 