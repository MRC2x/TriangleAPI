server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: triangle-service
  
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.triangle: DEBUG
    org.springframework.web: DEBUG
    org.springdoc: DEBUG
    org.springframework.boot.autoconfigure: DEBUG

# Swagger/OpenAPI Configuration
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true 